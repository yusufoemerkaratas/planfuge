name: Release Draft

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run build and test checks without drafting a release'
        type: boolean
        required: false
        default: false

jobs:
  release-draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: client
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pre-commit

      - name: Run Pre-commit Hooks
        run: |
          pre-commit run --all-files

      - name: Run Backend Tests
        run: |
          python3 -m unittest discover -s server/tests
          python3 -m unittest discover -s tests

      - name: Run Linter
        working-directory: client
        run: npm run lint

      - name: Run Frontend Tests
        working-directory: client
        run: npm run test

      - name: Build Frontend Production Assets
        working-directory: client
        run: npm run build

      - name: Validate and Build Docker Compose
        run: |
          docker compose config --quiet
          docker compose build

      - name: Package Release Artifacts
        run: |
          python3 scripts/package_release.py --version ${{ github.ref_name }}

      - name: Create Draft Release & Upload Assets
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            dist/planfuge-${{ github.ref_name }}.zip
            dist/planfuge-${{ github.ref_name }}.tar.gz
            dist/planfuge-frontend-${{ github.ref_name }}.zip
            dist/SHA256SUMS
