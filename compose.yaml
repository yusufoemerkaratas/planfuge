name: planfuge

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        APP_UID: ${APP_UID:-1000}
    init: true
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    init: true
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${PLANFUGE_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
