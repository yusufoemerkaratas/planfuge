repos:
  # ── Python ──────────────────────────────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]

  # ── Frontend ─────────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [ts, tsx, javascript, jsx, json, css, markdown]
        additional_dependencies:
          - prettier@3.4.2

  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        language: node
        entry: bash -c 'cd client && npx eslint --max-warnings 0'
        types_or: [ts, tsx]
        pass_filenames: false

      - id: tsc
        name: TypeScript type check
        language: node
        entry: bash -c 'cd client && npx tsc --noEmit'
        types_or: [ts, tsx]
        pass_filenames: false

exclude: "^(outputs/|client/dist/)"
